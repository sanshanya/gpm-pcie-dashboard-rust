name: Build Binary

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.1-devel-ubuntu22.04

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git build-essential clang libclang-dev pkg-config tar xz-utils

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format sources
        env:
          NVML_INCLUDE_DIR: /usr/local/cuda/include
        run: cargo fmt

      - name: Check build
        env:
          NVML_INCLUDE_DIR: /usr/local/cuda/include
        run: cargo check

      - name: Build release binary
        env:
          NVML_INCLUDE_DIR: /usr/local/cuda/include
        run: |
          cargo build --release
          mkdir -p dist
          cp target/release/gpm-pcie-dashboard-rust dist/gpm-pcie-dashboard-rust-x86_64-linux
          tar -C dist -czf gpm-pcie-dashboard-rust-x86_64-linux.tar.gz gpm-pcie-dashboard-rust-x86_64-linux

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpm-pcie-dashboard-rust-x86_64-linux
          path: gpm-pcie-dashboard-rust-x86_64-linux.tar.gz
